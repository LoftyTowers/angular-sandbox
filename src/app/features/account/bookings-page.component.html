<section>
  <app-page-title title="My Bookings" subtitle="Upcoming and past workshop sessions" />

  @if (bookings().length === 0) {
    <p>No bookings found for your account yet.</p>
  } @else {
    <ul>
      @for (booking of bookings(); track booking.id) {
        <li>
          <strong>{{ booking.id }}</strong>
          <span>
            {{ booking.customerName }} - {{ booking.amount | currency: booking.currency }} -
            {{ booking.createdAt | date: 'mediumDate' }}
          </span>
        </li>
      }
    </ul>
  }
</section>
