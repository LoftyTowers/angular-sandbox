<section>
  <app-page-title title="Basket" subtitle="Review selected workshops before checkout" />

  @if (items().length === 0) {
    <p>Your basket is currently empty.</p>
  } @else {
    <div class="basket-list">
      @for (item of items(); track item.workshop.id) {
        <article class="basket-item">
          <div>
            <h2>{{ item.workshop.title }}</h2>
            <app-price [amount]="item.workshop.price" [currency]="currency" label="Per ticket" />
          </div>

          <app-quantity-stepper
            [value]="item.quantity"
            label="Quantity"
            (valueChange)="updateQuantity(item.workshop.id, $event)"
          />

          <p class="line-total">
            <app-price [amount]="item.workshop.price * item.quantity" [currency]="currency" />
          </p>
          <button type="button" (click)="removeItem(item.workshop.id)">Remove</button>
        </article>
      }
    </div>

    <section class="totals">
      <p>Total tickets: {{ totals().totalQuantity }}</p>
      <p>Subtotal: <app-price [amount]="totals().subtotal" [currency]="currency" /></p>
    </section>
  }
</section>
