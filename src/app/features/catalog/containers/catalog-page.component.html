<section>
  <app-page-title
    title="Workshop Catalog"
    subtitle="Browse workshops and add sessions to your basket"
  />

  <label class="search-label" for="catalog-search">Search workshops</label>
  <input
    id="catalog-search"
    class="search-input"
    type="search"
    [formControl]="searchControl"
    placeholder="Search by title or description"
  />

  <div class="tag-filters" aria-label="Catalog tags">
    <button type="button" [class.active]="!selectedTag()" (click)="selectTag(null)">All</button>
    @for (tag of tags(); track tag) {
      <button type="button" [class.active]="selectedTag() === tag" (click)="selectTag(tag)">
        {{ tag }}
      </button>
    }
  </div>

  <p class="basket-hint">Selected for basket: {{ selectedCount() }}</p>

  @if (error()) {
    <p class="error-message">{{ error() }}</p>
  }

  @if (loading()) {
    <p class="loading-message">Loading workshops...</p>
  }

  <div class="workshop-grid">
    @for (workshop of filteredWorkshops(); track workshop.id) {
      <div class="catalog-item">
        <app-workshop-card
          [workshop]="workshop"
          [currency]="currency()"
          (add)="onWorkshopAdded($event)"
        />
        <a class="details-link" [routerLink]="['/catalog', workshop.id]">View details</a>
      </div>
    } @empty {
      <p>No workshops match this filter.</p>
    }
  </div>
</section>
