<div class="shell">
  <header class="shell-header">
    <a class="brand" routerLink="/catalog">Workshop Booking</a>

    <nav aria-label="Main navigation" class="shell-nav">
      <a routerLink="/catalog" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
        >Catalog</a
      >
      <a routerLink="/basket" routerLinkActive="active">Basket</a>
      <a routerLink="/account" routerLinkActive="active">Account</a>

  <main class="shell-content">

  <footer class="shell-footer">
    <small>Workshop Booking & Payments</small>
  </footer>
</div>
