name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci --ignore-scripts
      - name: Format Check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Test (CI)
        run: npm run test:ci
      - name: i18n Extract
        run: npm run i18n:extract
      - name: Build
        run: npm run build
      - name: Build Localized
        run: npm run build:localize
      - name: Accessibility (CI)
        run: npm run a11y:ci
